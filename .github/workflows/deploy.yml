name: Build & Deploy (Godot Web -> Vercel)

on:
  push:
    branches: [main, "claude/**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.3.0-stable
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          set -e
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv Godot_v${GODOT_VERSION}_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          # Web export templates
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz" -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}/

      - name: Import resources
        run: godot --headless --import || true

      - name: Export Web build
        run: |
          mkdir -p public
          godot --headless --export-release "Web" public/index.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: public

      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'
